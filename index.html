<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>廠內設備免登入智慧點檢系統 v2.0</title>
  
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
    body { background: #f4f6f9; color: #333; padding-bottom: 70px; }
    
    /* 頂部高質感中控台黑卡 */
    .header-dash { background: #2c3e50; color: white; padding: 22px 18px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); margin-bottom: 20px; }
    .header-title { display: flex; align-items: center; font-size: 14pt; font-weight: 700; letter-spacing: 0.5px; }
    .header-title .material-icons { margin-right: 8px; color: #3498db; }
    .header-subtitle { font-size: 9.5pt; color: #bdc3c7; margin-top: 6px; font-weight: 400; }

    /* 2.5D 切換導覽列 */
    .tab-container { display: flex; background: #e5e8e8; margin: 0 14px 20px 14px; padding: 5px; border-radius: 12px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
    .tab-btn { flex: 1; border: none; background: transparent; padding: 11px 0; font-size: 10pt; font-weight: 700; color: #7f8c8d; border-radius: 9px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.2s ease; }
    .tab-btn .material-icons { font-size: 14pt; }
    .tab-btn.active { background: white; color: #2c3e50; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }

    /* 頁面區塊控制 */
    .page-section { display: none; padding: 0 14px; }
    .page-section.active { display: block; }

    /* 2.5D 立體有顏色卡片基礎 */
    .card-3d { background: white; border-radius: 14px; padding: 18px; margin-bottom: 16px; border-bottom: 4px solid #d5dbdb; box-shadow: 0 5px 12px rgba(0,0,0,0.03); }
    .card-title { font-size: 11pt; font-weight: 700; color: #2c3e50; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #f2f4f4; padding-bottom: 8px; }
    
    /* 表單立體輸入框 */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 9.5pt; font-weight: 700; color: #5d6d7e; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 11px 12px; font-size: 10.5pt; border: 1px solid #d5dbdb; background: #fcfcfc; border-radius: 8px; border-bottom: 3px solid #d5dbdb; outline: none; color: #2c3e50; transition: border 0.2s; }
    .form-control:focus { border-color: #3498db; background: white; }
    .form-control:disabled { background: #eaeded; border-bottom-color: #d5dbdb; color: #7f8c8d; }

    /* 正常/異常 2.5D 大按鈕雙選卡 */
    .toggle-wrapper { display: flex; gap: 12px; margin-top: 8px; }
    .toggle-card { flex: 1; padding: 16px; border-radius: 12px; text-align: center; border: 1px solid #e5e8e8; border-bottom: 4px solid #e5e8e8; background: #fdfefe; cursor: pointer; transition: all 0.2s ease; }
    .toggle-card .material-icons { font-size: 22pt; margin-bottom: 4px; display: block; }
    .toggle-card p { font-size: 11pt; font-weight: 700; }
    
    .ok-active { background: #e8f8f5 !important; border-color: #2ecc71 !important; border-bottom: 5px solid #27ae60 !important; color: #27ae60; transform: translateY(1px); }
    .ng-active { background: #fdedec !important; border-color: #e74c3c !important; border-bottom: 5px solid #c0392b !important; color: #c0392b; transform: translateY(1px); }

    /* 相機模組外觀 */
    #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none; background: #000; }
    .btn-camera { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 10.5pt; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; border-bottom: 4px solid #2980b9; margin-bottom: 14px; cursor: pointer; }

    /* 送出鈕 */
    .btn-submit { width: 100%; background: #2ecc71; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 12pt; font-weight: 700; border-bottom: 5px solid #27ae60; margin-top: 10px; cursor: pointer; box-shadow: 0 4px 10px rgba(46,204,113,0.2); }
    .btn-submit:active { transform: translateY(2px); border-bottom-width: 2px; }

    /* 全局安全鎖定遮罩 */
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .overlay.active { opacity: 1; pointer-events: auto; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 手機底部安全宣告固定導覽 */
    .footer-secure { position: fixed; bottom: 0; left: 0; width: 100%; background: white; text-align: center; padding: 8px; font-size: 8pt; color: #bdc3c7; border-top: 1px solid #eedede; z-index: 999; }
  </style>
</head>
<body>

  <div id="global-overlay" class="overlay active">
    <div class="spinner"></div>
    <p id="overlay-text" style="font-size:11pt; color:#2c3e50; font-weight:500;">廠內數據安全通訊建置中...</p>
  </div>

  <div class="header-dash">
    <div class="header-title">
      <span class="material-icons">biotech</span>
      廠內設備免登入智慧點檢系統 v2.0
    </div>
    <div class="header-subtitle">現場自主管理機制 • 2.5D 高質感設計</div>
  </div>

  <div class="tab-container">
    <button id="tab-scan" class="tab-btn active" onclick="switchTab('scan')">
      <span class="material-icons">qr_code_scanner</span>手機掃碼點檢
    </button>
    <button id="tab-history" class="tab-btn" onclick="switchTab('history')">
      <span class="material-icons">history_edu</span>歷史點檢履歷
    </button>
    <button id="tab-analysis" class="tab-btn" onclick="switchTab('analysis')">
      <span class="material-icons">analytics</span>月度趨勢分析
    </button>
  </div>

  <div id="sec-scan" class="page-section active">
    <div class="card-3d">
      <div class="card-title"><span class="material-icons">photo_camera</span>智慧掃描相機模組</div>
      <button type="button" class="btn-camera" onclick="toggleCamera()">
        <span class="material-icons" id="icon-camera">camera_alt</span>
        <span id="txt-camera">開啟手機掃描相機</span>
      </button>
      <div id="scanner-area" style="display: none; margin-bottom: 10px;">
        <div id="reader"></div>
      </div>
    </div>

    <form id="inspection-form" onsubmit="handleFormSubmit(event)">
      <div class="card-3d">
        <div class="card-title"><span class="material-icons">assignment</span>設備現場點檢項目表單</div>
        
        <div class="form-group">
          <label>機台編號</label>
          <input type="text" id="equip-id" class="form-control" placeholder="請先掃描機台 QR Code" readonly required>
        </div>
        <div class="form-group">
          <label>機台名稱</label>
          <input type="text" id="equip-name" class="form-control" placeholder="自動連動比對帶出" disabled>
        </div>
        <div class="form-group">
          <label>點檢同仁姓名</label>
          <select id="worker-select" class="form-control" required>
            <option value="">-- 同步雲端名單中 --</option>
          </select>
        </div>
        <div class="form-group">
          <label>今日運作班別</label>
          <select id="shift-select" class="form-control" required>
            <option value="日班">日班</option>
            <option value="夜班">夜班</option>
          </select>
        </div>
        <div class="form-group">
          <label>廠內常規點檢項目</label>
          <select id="item-select" class="form-control" required>
            <option value="">-- 同步雲端項目中 --</option>
          </select>
        </div>
      </div>

      <div class="card-3d">
        <div class="card-title"><span class="material-icons">fact_check</span>全盤點檢結果摘要</div>
        <div class="toggle-wrapper">
          <div id="card-ok" class="toggle-card" onclick="setResultSummary('正常')">
            <span class="material-icons">check_circle</span>
            <p>正常無誤</p>
          </div>
          <div id="card-ng" class="toggle-card" onclick="setResultSummary('發現異常')">
            <span class="material-icons">error</span>
            <p>發現異常</p>
          </div>
        </div>

        <div id="anomaly-block" class="form-group" style="margin-top: 16px; display: none;">
          <label style="color:#c0392b;">⚠️ 異常詳細狀況現場描述</label>
          <textarea id="anomaly-detail" class="form-control" rows="3" placeholder="請詳細說明現場異常現象（例如：異音、漏油、未達標準溫度...）" style="resize: none; font-family:inherit;"></textarea>
        </div>
      </div>

      <button type="submit" class="btn-submit">🔒 確認無誤，安全加密上傳雲端庫</button>
    </form>
  </div>

  <div id="sec-history" class="page-section">
    <div class="card-3d">
      <div class="card-title"><span class="material-icons">history</span>廠內即時點檢履歷確認</div>
      <div id="history-container">
        <div style="text-align:center; padding:20px; color:#95a5a6;">[正在與後台同步中...]</div>
      </div>
    </div>
  </div>

  <div id="sec-analysis" class="page-section">
    <div class="card-3d">
      <div class="card-title"><span class="material-icons">bar_chart</span>本月現場大數據綜合看板</div>
      <div id="analysis-container">
        <div style="text-align:center; padding:20px; color:#95a5a6;">[正在計算月度報表中...]</div>
      </div>
    </div>
  </div>

  <div class="footer-secure">
    🛡️ 本系統由 SSL 加密連線保護，數據直接寫入廠內獨立資產雲端資料庫
  </div>

  <script>
    // ⚠️ 已經直接替換為教練提供的最新正確路徑 ⚠️
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycby5xZsL5tpbNyTkvQaOMlKiXBT3nptAfeBIKpsiaLTL2oX6ypLBn52UBZ_XB3R924YkWw/exec";
    
    let systemMasterData = null;
    let html5QrcodeScanner = null;
    let selectedSummary = "";

    // 網頁一載入，主動觸發雲端同步
    window.addEventListener('DOMContentLoaded', () => {
      fetchCloudData();
    });

    // 透過 JSONP 跨網域撈取試算表的所有數據
    function fetchCloudData(targetMonth = "") {
      showLoading("同步雲端製程數據庫中...");
      
      const callbackName = "jsonp_callback_" + Math.round(100000 * Math.random());
      window[callbackName] = function(response) {
        if(response.status === 'success') {
          systemMasterData = response;
          renderFormDropdowns();
          renderHistoryCards();     
          renderAnalysisDashboard(); 
          checkUrlParameter();      
          hideLoading();
        } else {
          alert("雲端同步失敗：" + response.message);
          hideLoading();
        }
        delete window[callbackName];
        document.getElementById(scriptId).remove();
      };

      const scriptId = "jsonp_script_" + Math.round(100000 * Math.random());
      const script = document.createElement('script');
      script.id = scriptId;
      script.src = `${BACKEND_URL}?action=getInitData&targetMonth=${targetMonth}&callback=${callbackName}`;
      document.body.appendChild(script);
    }

    // 解析網址上的 ?eq=xxxx 參數
    function checkUrlParameter() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        let eqParam = urlParams.get('eq') || urlParams.get('eqId');
        if (eqParam && systemMasterData && systemMasterData.equipments) {
          const match = systemMasterData.equipments.find(e => e.id.toLowerCase() === eqParam.trim().toLowerCase());
          if (match) {
            document.getElementById('equip-id').value = match.id;
            document.getElementById('equip-name').value = match.name;
          }
        }
      } catch (e) {
        console.error("網址參數解析異常:", e);
      }
    }

    // 將名單倒入下拉選單
    function renderFormDropdowns() {
      if(!systemMasterData) return;

      const workerSelect = document.getElementById('worker-select');
      workerSelect.innerHTML = '<option value="">-- 請選擇點檢同仁 --</option>';
      systemMasterData.users.forEach(user => {
        workerSelect.innerHTML += `<option value="${user}">${user}</option>`;
      });

      const itemSelect = document.getElementById('item-select');
      itemSelect.innerHTML = '<option value="">-- 請選擇檢查項目 --</option>';
      systemMasterData.items.forEach(item => {
        itemSelect.innerHTML += `<option value="${item}">${item}</option>`;
      });
    }

    // 2.5D 有顏色立體歷史點檢履歷卡片渲染
    function renderHistoryCards() {
      const container = document.getElementById('history-container');
      if (!systemMasterData || !systemMasterData.records || systemMasterData.records.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:20px; color:#95a5a6;">廠內目前尚無點檢紀錄。</div>`;
        return;
      }

      let html = "";
      systemMasterData.records.forEach(r => {
        let isNg = r.summary.includes("異常") || r.summary.toLowerCase().includes("ng");
        let statusBadge = isNg 
          ? `<span style="background:#fdedec; color:#c0392b; padding:4px 8px; border-radius:6px; font-size:9pt; font-weight:700; border:1px solid #f5b7b1;">🔴 異常</span>`
          : `<span style="background:#e8f8f5; color:#27ae60; padding:4px 8px; border-radius:6px; font-size:9pt; font-weight:700; border:1px solid #a3e4d7;">🟢 正常</span>`;
        
        let cardStyle = isNg
          ? `background: #fffcfc; border-left: 5px solid #e74c3c; border-bottom: 4px solid #f5b7b1;`
          : `background: #ffffff; border-left: 5px solid #2ecc71; border-bottom: 4px solid #d5dbdb;`;

        html += `
          <div style="padding: 14px; margin-bottom: 12px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.03); ${cardStyle}">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
              <strong style="font-size: 11pt; color: #2c3e50;">${r.id} (${r.name})</strong>
              ${statusBadge}
            </div>
            <div style="font-size: 9.5pt; color: #5d6d7e; line-height: 1.6;">
              <p>⏱️ <b>時間：</b>${r.time} (${r.shift})</p>
              <p>👤 <b>同仁：</b>${r.worker}</p>
              <p style="margin-top: 4px; padding: 6px; background: rgba(0,0,0,0.02); border-radius: 6px; font-size: 9pt; color: #34495e;">
                📄 <b>詳細：</b>${r.detail}
              </p>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    // 月度趨勢分析大數據看板渲染
    function renderAnalysisDashboard() {
      const container = document.getElementById('analysis-container');
      if (!systemMasterData || !systemMasterData.analysis) return;

      const ana = systemMasterData.analysis;
      
      let html = `
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;">
          <div style="background: #ebf5fb; padding: 12px; border-radius: 10px; border-bottom: 3px solid #a9cce3; text-align: center;">
            <p style="font-size: 9pt; color: #2980b9; font-weight:700;">本月點檢總次數</p>
            <p style="font-size: 18pt; font-weight: 700; color: #2c3e50; margin-top:4px;">${ana.totalCount} <span style="font-size:10pt;">次</span></p>
          </div>
          <div style="background: ${ana.anomalyCount > 0 ? '#fdedec' : '#e8f8f5'}; padding: 12px; border-radius: 10px; border-bottom: 3px solid ${ana.anomalyCount > 0 ? '#f5b7b1' : '#a3e4d7'}; text-align: center;">
            <p style="font-size: 9pt; color: ${ana.anomalyCount > 0 ? '#c0392b' : '#27ae60'}; font-weight:700;">當月異常率</p>
            <p style="font-size: 18pt; font-weight: 700; color: ${ana.anomalyCount > 0 ? '#c0392b' : '#27ae60'}; margin-top:4px;">${ana.anomalyRate}</p>
          </div>
        </div>
        
        <div style="margin-bottom: 12px;">
          <p style="font-size: 10pt; font-weight: 700; color: #34495e; margin-bottom: 6px;">📊 班別點檢分佈</p>
          <div style="display:flex; font-size:9pt; color:white; font-weight:700; border-radius:6px; overflow:hidden; height:20px;">
            <div style="background:#f39c12; width: ${ana.totalCount > 0 ? (ana.shiftData["日班"]/ana.totalCount*100) : 50}%; display:flex; align-items:center; justify-content:center;">日班 (${ana.shiftData["日班"]})</div>
            <div style="background:#34495e; width: ${ana.totalCount > 0 ? (ana.shiftData["夜班"]/ana.totalCount*100) : 50}%; display:flex; align-items:center; justify-content:center;">夜班 (${ana.shiftData["夜班"]})</div>
          </div>
        </div>
      `;

      if(ana.topEquipments && ana.topEquipments.length > 0) {
        html += `<p style="font-size: 10pt; font-weight: 700; color: #34495e; margin-top: 14px; margin-bottom: 6px;">⚠️ 廠內異常高發機台排行</p>`;
        ana.topEquipments.slice(0, 3).forEach((eq, idx) => {
          html += `
            <div style="display:flex; justify-content:space-between; align-items:center; font-size:9.5pt; padding:6px 0; border-bottom:1px dashed #d5dbdb;">
              <span>No.${idx+1} ${eq.id} - ${eq.name}</span>
              <span style="background:#f9ebd2; color:#d35400; padding:2px 6px; border-radius:4px; font-weight:700;">${eq.count} 次</span>
            </div>
          `;
        });
      }
      container.innerHTML = html;
    }

    // 相機控制邏輯
    function toggleCamera() {
      const area = document.getElementById('scanner-area');
      const txt = document.getElementById('txt-camera');
      const icon = document.getElementById('icon-camera');

      if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
        txt.textContent = "開啟手機掃描相機";
        icon.textContent = "camera_alt";
        area.style.display = "none";
        html5QrcodeScanner.stop().then(() => { html5QrcodeScanner = null; }).catch(err => console.error(err));
      } else {
        txt.textContent = "關閉手機相機鏡頭";
        icon.textContent = "videocam_off";
        area.style.display = "block";
        
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start(
          { facingMode: "environment" }, 
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess,
          onScanFailure
        ).catch(err => {
          alert("無法獲取相機權限，請確認瀏覽器隱私設定。");
          resetCameraUI();
        });
      }
    }

    function resetCameraUI() {
      document.getElementById('txt-camera').textContent = "開啟手機掃描相機";
      document.getElementById('icon-camera').textContent = "camera_alt";
      document.getElementById('scanner-area').style.display = "none";
      html5QrcodeScanner = null;
    }

    function onScanSuccess(decodedText) {
      if (navigator.vibrate) navigator.vibrate(100);
      let targetId = decodedText.trim();
      try {
        if(decodedText.includes('?')) {
          const urlParams = new URLSearchParams(decodedText.split('?')[1]);
          targetId = urlParams.get('eq') || urlParams.get('eqId') || targetId;
        }
      } catch(e) {}

      const match = systemMasterData.equipments.find(e => e.id.toLowerCase() === targetId.toLowerCase());
      if(match) {
        document.getElementById('equip-id').value = match.id;
        document.getElementById('equip-name').value = match.name;
        toggleCamera();
      } else {
        alert(`廠內比對失敗！查無編號 [${targetId}] 的設備。`);
      }
    }
    function onScanFailure(error) {}

    function setResultSummary(status) {
      selectedSummary = status;
      const cardOk = document.getElementById('card-ok');
      const cardNg = document.getElementById('card-ng');
      const anomalyBlock = document.getElementById('anomaly-block');

      if(status === '正常') {
        cardOk.className = "toggle-card ok-active";
        cardNg.className = "toggle-card";
        anomalyBlock.style.display = "none";
        document.getElementById('anomaly-detail').required = false;
      } else {
        cardOk.className = "toggle-card";
        cardNg.className = "toggle-card ng-active";
        anomalyBlock.style.display = "block";
        document.getElementById('anomaly-detail').required = true;
      }
    }

    function resetResultToggle() {
      selectedSummary = "";
      document.getElementById('card-ok').className = "toggle-card";
      document.getElementById('card-ng').className = "toggle-card";
      document.getElementById('anomaly-block').style.display = "none";
    }

    // 表單上傳提交
    function handleFormSubmit(event) {
      event.preventDefault();
      if(!selectedSummary) { alert("請勾選點檢結果為正常或發現異常！"); return; }
      const equipId = document.getElementById('equip-id').value;
      if(!equipId) { alert("請先掃描機台 QR Code！"); return; }

      showLoading("正在將點檢數據安全寫入雲端...");

      const selectedItem = document.getElementById('item-select').value;
      let detailText = document.getElementById('anomaly-detail').value.trim();
      let finalDetail = selectedSummary === '正常' ? `[項目:${selectedItem}] 正常運作` : `[項目:${selectedItem}] ${detailText}`;

      const payload = {
        equipId: equipId,
        equipName: document.getElementById('equip-name').value,
        worker: document.getElementById('worker-select').value,
        shift: document.getElementById('shift-select').value,
        summary: selectedSummary,
        detail: finalDetail
      };

      const callbackName = "jsonp_submit_" + Math.round(100000 * Math.random());
      window[callbackName] = function(response) {
        if(response.status === 'success') {
          alert("🎉 上傳成功！數據已完美寫入 Google 試算表。");
          document.getElementById('inspection-form').reset();
          resetResultToggle();
          document.getElementById('equip-id').value = "";
          document.getElementById('equip-name').value = "";
          fetchCloudData(); 
        } else {
          alert("上傳失敗：" + response.message);
          hideLoading();
        }
        delete window[callbackName];
        document.getElementById(scriptId).remove();
      };

      const scriptId = "jsonp_script_" + Math.round(100000 * Math.random());
      const script = document.createElement('script');
      script.id = scriptId;
      script.src = `${BACKEND_URL}?action=submitData&data=${encodeURIComponent(JSON.stringify(payload))}&callback=${callbackName}`;
      document.body.appendChild(script);
    }

    // 分頁切換
    function switchTab(targetPage) {
      document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      
      if (html5QrcodeScanner && html5QrcodeScanner.isScanning) { toggleCamera(); }

      if(targetPage === 'scan') {
        document.getElementById('sec-scan').classList.add('active');
        document.getElementById('tab-scan').classList.add('active');
      } else if(targetPage === 'history') {
        document.getElementById('sec-history').classList.add('active');
        document.getElementById('tab-history').classList.add('active');
      } else if(targetPage === 'analysis') {
        document.getElementById('sec-analysis').classList.add('active');
        document.getElementById('tab-analysis').classList.add('active');
      }
    }

    function showLoading(text) {
      document.getElementById('overlay-text').textContent = text;
      document.getElementById('global-overlay').classList.add('active');
    }
    function hideLoading() {
      document.getElementById('global-overlay').classList.remove('active');
    }
  </script>
</body>
</html>
